<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Preview</title>
    <link rel="stylesheet" href="preview.css">
</head>
<body>
<body>

    <div class="product-container">
        <!-- Product 1 -->
        <div class="product-design product-template7" data-product-id="1" data-product-category="electronics" data-product-type="simple">
            <div class="cta-container">
                <div class="product-item">
                    <div class="product-thumb">
                        <a href="#">
                            <div class="pri-img" style="background-image: url('https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop');"></div>
                        </a>
                        <div class="product-badge">
                            <span class="new-badge product-label">New</span>
                            <span class="discount-badge product-label">-15%</span>
                        </div>

                    </div>
                    <div class="product-caption product-identity">
                        <h3>
                            <a href="#">Premium Wireless Headphones</a>
                        </h3>
                        <span class="product-category">Category: <a href="#">Electronics</a></span>
                        <div class="ratings">
                            <span class="spr-badge" data-rating="4.5">
                                <span class="spr-starrating spr-badge-starrating">
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-regular fa-star"></i>
                                </span>
                            </span>
                        </div>
                        <p class="price-box">
                            <span class="product-price">
                                <span class="money">$199.99</span>
                            </span>
                            <span class="price-old">
                                <del>
                                    <span class="money">$239.99</span>
                                </del>
                            </span>
                        </p>
                        <p class="cta-description">Experience premium sound quality with these wireless headphones featuring noise cancellation and 30-hour battery life.</p>
                        <div class="cta-actions">
                            <div class="product-cart-action">
                                <a href="#" data-product-id="1" class="add-to-cart ajax-spin-cart btn-cart">
                                    <i class="fa-solid fa-cart-shopping"></i>
                                    Add to Cart
                                </a>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
        </div>


            </div>
