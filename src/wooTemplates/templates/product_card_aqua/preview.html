<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Preview</title>

</head>
<body>

    <div class="product-container">
        <!-- Product 1 -->
        <div class="product-design product-template17" data-product-id="1" data-product-category="electronics" data-product-type="simple">
            <div class="product-item">
                <div class="product-thumb">
                    <a href="#">
                        <img class="popup_cart_image pri-img" src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop" alt="Premium Headphones">
                    </a>
                    <div class="product-badge">
                        <span class="new-badge product-label">New</span>
                        <span class="discount-badge product-label">-15%</span>
                    </div>
                    <div class="hover-content">
                        <div class="product-caption">
                            <h3 class="product-title">
                                <a href="#">Premium Wireless Headphones</a>
                            </h3>
                            <div class="product-identity">
                                <p class="product-category">
                                    <a href="#">Electronics</a>
                                </p>
                                <div class="ratings">
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-solid fa-star"></i>
                                    <i class="fa-regular fa-star"></i>
                                </div>
                            </div>
                            <div class="price-box">
                                <span class="price-old">
                                    <del>$239.99</del>
                                </span>
                                <span class="product-price">$199.99</span>
                            </div>
                        </div>
                       
                        <div class="box-cart">
                            <div class="product-cart-action">
                                <a href="#" data-product-id="1" class="add-to-cart ajax-spin-cart btn btn-cart">
                                    Add to Cart
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        
    </div>
</body>
</body>
</html>
