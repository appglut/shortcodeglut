<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Preview</title>
    
</head>
<body>
<body>
<body>

    <div class="product-container">
        <!-- Product 1 -->
        <div class="product-design product-template1" data-product-id="1" data-product-category="electronics" data-product-type="simple">
            <div class="product-item">
                <div class="product-thumb">
                    <a href="#">
                        <img class="popup_cart_image pri-img" src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400&h=400&fit=crop" alt="Premium Headphones">
                    </a>
                    <div class="product-badge">
                        <span class="new-badge product-label">New</span>
                        <span class="discount-badge product-label">-15%</span>
                    </div>
                  
                    <div class="box-cart">
                        <div class="product-cart-action">
                            <a href="#" data-product-id="1" class="add-to-cart ajax-spin-cart btn btn-cart">
                                <span>
                                    <span class="cart-contents">
                                        <i class="fa fa-shopping-cart"></i>
                                        <span class="cart-title">Add to Cart</span>
                                    </span>
                                </span>
                            </a>
                        </div>
                    </div>
                </div>
                <div class="product-caption">
                    <div class="product-identity">
                        <p class="product-category">
                            <a href="#">Electronics</a>
                        </p>
                        <div class="ratings">
                            <span class="spr-badge" data-rating="4.5">
                                <span class="spr-starrating spr-badge-starrating">
                                    <i class="fa fa-solid fa-star"></i>
                                    <i class="fa fa-solid fa-star"></i>
                                    <i class="fa fa-solid fa-star"></i>
                                    <i class="fa fa-solid fa-star"></i>
                                    <i class="fa fa-regular fa-star"></i>
                                </span>
                            </span>
                        </div>
                    </div>
                    <div class="product-identity">
                        <p class="product-title popup_cart_title">
                            <a href="#">Premium Wireless Headphones</a>
                        </p>
                        <div class="price-box">
                            <span class="product-price">
                                <span class="money">$199.99</span>
                            </span>
                            <span class="price-old">
                                <del>
                                    <span class="money">$239.99</span>
                                </del>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</body>
</html>
